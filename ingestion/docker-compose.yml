services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: qamvp-ingestion-pg
    environment:
      POSTGRES_USER: ingestion
      POSTGRES_PASSWORD: ingestion
      POSTGRES_DB: ingestion
    ports:
      - "5433:5432"
    volumes:
      - qamvp_ingestion_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ingestion -d ingestion"]
      interval: 5s
      timeout: 5s
      retries: 8

volumes:
  qamvp_ingestion_pgdata:
